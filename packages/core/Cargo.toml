[package]
name = "glean-core"
version = "0.1.0"
edition = "2021"
rust-version = "1.91"
description = "Glean core engine library (indexing pipeline, storage)."
license = "Apache-2.0"

[lib]
path = "src/lib.rs"

[features]
default = ["fastembed"]
fastembed = ["dep:fastembed"]

[dependencies]
arrow-array = "58"
arrow-schema = "58"
dirs = "6"
fastembed = { version = "5", optional = true }
futures = "0.3"
ignore = "0.4"
lance-index = "6.0"
lancedb = "0.29"
notify = "6"
rusqlite = { version = "0.39", features = ["bundled"] }
sha2 = "0.10"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync"] }
tracing = "0.1"
walkdir = "2"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
