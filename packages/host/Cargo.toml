[package]
name = "glean-host"
version = "0.1.0"
edition = "2021"
rust-version = "1.91"
description = "Glean host runtime: daemon loop, MCP routing, config editor, status (no binary entrypoint)."
license = "Apache-2.0"
publish = false

[lib]
path = "src/lib.rs"

[features]
default = []
enterprise = ["dep:glean-enterprise"]

[dependencies]
glean-core = { path = "../core" }
glean-enterprise = { path = "../enterprise", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time", "signal"] }
tokio-util = { version = "0.7", features = ["rt"] }
toml = { version = "1.1", default-features = false, features = ["serde"] }
tracing = "0.1"

[dev-dependencies]
tempfile = "3"
