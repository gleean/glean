name: Rust CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    concurrency:
      group: rust-ci
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          # Private submodule: create repo secret ENTERPRISE_SUBMODULE_PAT (fine-grained PAT, read-only on glean-enterprise).
          submodules: recursive
          token: ${{ secrets.ENTERPRISE_SUBMODULE_PAT }}

      - name: Install system packages (Lance protoc + Tauri Linux deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            build-essential \
            curl \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Lint & test (mirrors scripts/verify_rust.sh)
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
