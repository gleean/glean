name: Rust CI (fmt, clippy, test)

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    # Skip version-only release commits from release-please (already validated on the Release PR).
    if: >-
      github.event_name == 'pull_request' ||
      !contains(github.event.head_commit.message, 'chore(main): release')
    concurrency:
      group: rust-ci
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ENTERPRISE_SUBMODULE_PAT }}

      - name: Install system packages (protoc only; no Tauri/WebKit on Linux CI)
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler build-essential libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-ci

      - name: Lint and test (excludes glean-desktop; built on release matrix)
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --exclude glean-desktop -- -D warnings
          cargo test --workspace --exclude glean-desktop
