name: Rust CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    concurrency:
      group: rust-ci
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          # Private submodule: create repo secret ENTERPRISE_SUBMODULE_PAT (fine-grained PAT, read-only on glean-enterprise).
          submodules: recursive
          token: ${{ secrets.ENTERPRISE_SUBMODULE_PAT }}

      - name: Install protobuf compiler (Lance / prost codegen)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Lint & test (mirrors scripts/verify_rust.sh)
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
