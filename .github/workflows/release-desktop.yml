# Entry points: tag push (PAT/human), manual re-run, or via release-please workflow_call.
name: Release Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and upload (e.g. v0.1.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/release-desktop-reusable.yml
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    secrets: inherit
