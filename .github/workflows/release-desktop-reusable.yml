# Reusable desktop + CLI release build. Called from release-please (primary) or release-desktop.yml.
name: Release Desktop (reusable)

on:
  workflow_call:
    inputs:
      tag:
        description: "Git tag to build (e.g. v0.1.2)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  ensure-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Create GitHub Release (idempotent)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: Glean Desktop ${{ inputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true

  release:
    needs: ensure-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-aarch64
            platform: macos-14
            target: aarch64-apple-darwin
            name: macOS Apple Silicon
            cli_asset: glean-aarch64-apple-darwin
          # macOS Intel — disabled until x86_64-apple-darwin has ONNX Runtime (ort-sys) prebuilts or a custom/link-from-source setup.
          # - id: macos-x86_64
          #   platform: macos-15-intel
          #   target: x86_64-apple-darwin
          #   name: macOS Intel
          #   cli_asset: glean-x86_64-apple-darwin
          - id: windows-x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows x64
            cli_asset: glean-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
          submodules: recursive
          token: ${{ secrets.ENTERPRISE_SUBMODULE_PAT != '' && secrets.ENTERPRISE_SUBMODULE_PAT || github.token }}

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-desktop
          workspaces: |
            apps/cli
            apps/desktop/src-tauri
            packages/core
            packages/host

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build glean CLI (sidecar + standalone release asset)
        run: cargo build -p glean-cli --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET: ${{ matrix.target }}

      - name: Prepare Tauri externalBin sidecar
        shell: bash
        run: ./scripts/prepare_sidecar_bin.sh
        env:
          CARGO_TARGET: ${{ matrix.target }}
          PROFILE: release

      - name: Stage CLI binary for upload
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp "target/${{ matrix.target }}/release/glean.exe" "${{ matrix.cli_asset }}"
          else
            cp "target/${{ matrix.target }}/release/glean" "${{ matrix.cli_asset }}"
          fi
          chmod +x "${{ matrix.cli_asset }}"

      - name: Build Tauri desktop bundle
        run: pnpm --filter @glean/desktop tauri build -- --target ${{ matrix.target }}
        env:
          CI: true

      - name: Upload desktop and CLI assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          TARGET="${{ matrix.target }}"
          assets=("${{ matrix.cli_asset }}")

          shopt -s nullglob
          if [[ "$TARGET" == *windows* ]]; then
            assets+=(target/"$TARGET"/release/bundle/nsis/*.exe)
          else
            assets+=(target/"$TARGET"/release/bundle/dmg/*.dmg)
          fi

          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "error: no release assets found for $TARGET" >&2
            find "target/$TARGET/release/bundle" -type f 2>/dev/null || true
            exit 1
          fi

          echo "Uploading ${#assets[@]} asset(s) to $TAG"
          gh release upload "$TAG" "${assets[@]}" --clobber
