name: Release Please

on:
  push:
    branches: [main, master]

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # Job outputs cannot read path-scoped step outputs (apps/desktop--*); bridge via export step.
      releases_created: ${{ steps.export.outputs.releases_created }}
      tag_name: ${{ steps.export.outputs.tag_name }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # PAT recommended: GITHUB_TOKEN tags/releases do not chain-trigger other workflows.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Export release outputs
        id: export
        env:
          RELEASES_CREATED: ${{ steps.release.outputs.releases_created }}
          DESKTOP_RELEASE_CREATED: ${{ steps.release.outputs['apps/desktop--release_created'] }}
          TAG_NAME: ${{ steps.release.outputs['apps/desktop--tag_name'] }}
        run: |
          if [[ "${DESKTOP_RELEASE_CREATED}" == "true" || "${RELEASES_CREATED}" == "true" ]]; then
            echo "releases_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "releases_created=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release-please releases_created=${RELEASES_CREATED} apps/desktop=${DESKTOP_RELEASE_CREATED} tag=${TAG_NAME}"

  build-desktop:
    needs: release-please
    if: >-
      needs.release-please.outputs.releases_created == 'true' &&
      needs.release-please.outputs.tag_name != ''
    permissions:
      contents: write
    uses: ./.github/workflows/release-desktop-reusable.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
