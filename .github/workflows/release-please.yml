name: Release Please

on:
  push:
    branches: [main, master]

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Repo Settings → Actions → General: enable BOTH read/write workflow permissions
    # AND "Allow GitHub Actions to create and approve pull requests" (off by default for
    # new personal repos). YAML permissions alone do not enable PR creation; see:
    # https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/enabling-features-for-your-repository/managing-github-actions-settings-for-a-repository#preventing-github-actions-from-creating-or-approving-pull-requests
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
