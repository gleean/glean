name: Release Please

on:
  push:
    branches: [main, master]

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # Monorepo path `apps/desktop` — not root `release_created` / `tag_name` (see release-please-action README).
      release_created: ${{ steps.release.outputs['apps/desktop--release_created'] }}
      tag_name: ${{ steps.release.outputs['apps/desktop--tag_name'] }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Optional secret RELEASE_PLEASE_TOKEN (PAT): tag push may trigger on: push:tags as backup.
          # Primary desktop build uses build-desktop workflow_call below (GITHUB_TOKEN tags do not).
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Log release outputs
        if: always()
        run: |
          echo "apps/desktop--release_created=${{ steps.release.outputs['apps/desktop--release_created'] }}"
          echo "apps/desktop--tag_name=${{ steps.release.outputs['apps/desktop--tag_name'] }}"

  build-desktop:
    needs: release-please
    if: >-
      needs.release-please.outputs.release_created == 'true' &&
      needs.release-please.outputs.tag_name != ''
    permissions:
      contents: write
    uses: ./.github/workflows/release-desktop-reusable.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
