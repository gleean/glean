name: Release Please

on:
  push:
    branches: [main, master]

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Optional secret RELEASE_PLEASE_TOKEN (PAT): tag push may trigger on: push:tags as backup.
          # Primary desktop build uses build-desktop workflow_call below (GITHUB_TOKEN tags do not).
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-desktop:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write
    uses: ./.github/workflows/release-desktop-reusable.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
